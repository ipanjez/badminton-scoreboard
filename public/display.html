<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display Scoreboard Bulutangkis</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* Menggunakan font tebal layaknya siaran TV Olahraga */
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap');

    :root {
      --bg-dark: #000000;
      --team-a-name: #ff4d4d; /* Merah Muda / Pinkish */
      --team-b-name: #39ff88; /* Hijau Neon */
      --team-a-bg: #d92525;
      --team-b-bg: #004d1a;
      --border-color: #222222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: #ffffff;
      font-family: 'Roboto Condensed', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .scoreboard {
      width: min(90vw, 1360px);
      border: 1px solid var(--border-color);
      background-color: #050505;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 26px;
      border-bottom: 1px solid var(--border-color);
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #tournamentNameTitle {
      color: #f9e65c;
      margin-right: 20px;
      flex: 1 1 42%;
      min-width: 0;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #category {
      flex: 1 1 auto;
      text-align: center;
    }

    #gameBadge {
      flex: 0 0 auto;
      text-align: right;
    }

    .team-row {
      display: flex;
      min-height: 152px;
      border-bottom: 1px solid var(--border-color);
      position: relative;
      transition: border 0.1s ease;
    }

    .team-row:last-child {
      border-bottom: none;
    }

    /* Blok border menyala saat pemain memegang Servis */
    .team-row.serving-A {
      border: 4px solid #f9e65c;
      z-index: 2;
    }

    .team-row.serving-B {
      border: 4px solid #39ff88;
      z-index: 2;
    }

    .indicator {
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      visibility: hidden;
      flex: 0 0 44px;
    }

    /* Indikator Arrow Muncul */
    .team-row.serving-A .indicator { visibility: visible; color: #f9e65c; }
    .team-row.serving-B .indicator { visibility: visible; color: #39ff88; }

    /* Bendera Indonesia */
    .flag {
      width: 52px;
      height: 36px;
      align-self: center;
      margin-right: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      font-size: 32px;
      line-height: 1;
      user-select: none;
      flex: 0 0 52px;
    }
    .flag .top, .flag .bottom { display: none; }

    .player-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      padding-right: 8px;
    }

    .player-names {
      font-size: 32px;
      font-weight: bold;
      line-height: 0.98;
      display: flex;
      flex-direction: column;
      letter-spacing: 0.4px;
    }

    .team-row.a .player-names { color: var(--team-a-name); }
    .team-row.b .player-names { color: var(--team-b-name); }

    .club-name {
      font-size: 16px;
      color: #ffffff;
      margin-top: 4px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .history {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      font-size: 24px;
      font-weight: bold;
      color: #aaaaaa;
      min-width: 64px;
      text-align: center;
      line-height: 1;
    }

    .score-box {
      width: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      font-weight: bold;
      flex: 0 0 170px;
    }

    .team-row.a .score-box { background-color: var(--team-a-bg); color: #ffffff; }
    .team-row.b .score-box { background-color: var(--team-b-bg); color: #39ff88; }
  </style>
</head>
<body>
  <div class="scoreboard">
    <div class="header">
      <div id="tournamentNameTitle"></div>
      <div id="category">MD - FINAL</div>
      <div id="gameBadge">GAME 1</div>
    </div>

    <div id="playerA" class="team-row a">
      <div class="indicator">▶</div>
      <div class="flag" id="flagA">🇮🇩</div>
      <div class="player-details">
        <div id="nameA" class="player-names">
          <span>PLAYER A1</span>
          <span>PLAYER A2</span>
        </div>
        <div class="club-name" id="clubA"></div>
      </div>
      <div class="history">
        <span id="histA1"></span>
        <span id="histA2"></span>
      </div>
      <div id="scoreA" class="score-box">0</div>
    </div>

    <div id="playerB" class="team-row b">
      <div class="indicator">▶</div>
      <div class="flag" id="flagB">🇮🇩</div>
      <div class="player-details">
        <div id="nameB" class="player-names">
          <span>PLAYER B1</span>
          <span>PLAYER B2</span>
        </div>
        <div class="club-name" id="clubB"></div>
      </div>
      <div class="history">
        <span id="histB1"></span>
        <span id="histB2"></span>
      </div>
      <div id="scoreB" class="score-box">0</div>
    </div>
  </div>

  <script>
    const socket = window.io();

    // Fungsi helper format susunan nama pemain bertumpuk
    function updateNames(elementId, p1, p2) {
      const el = document.getElementById(elementId);
      if (p1 && p2) {
        el.innerHTML = `<span>${p1}</span><span>${p2}</span>`;
      } else if (p1 || p2) {
        el.innerHTML = `<span>${p1 || p2}</span>`;
      } else {
        el.innerHTML = `<span>-</span>`;
      }
    }

    // Menerima update real-time dari Server Socket.IO
    socket.on('state:update', (state) => {
      if (!state) return;

      document.getElementById('tournamentNameTitle').textContent = state.tournamentName || '';
      document.getElementById('category').textContent = (state.category || 'MD - FINAL').toUpperCase();
      document.getElementById('gameBadge').textContent = `GAME ${state.activeGame || 1}`;

      // Update susunan nama Ganda/Single
      updateNames('nameA', state.playerA1, state.playerA2);
      updateNames('nameB', state.playerB1, state.playerB2);
      document.getElementById('clubA').textContent = state.clubA || state.teamAClub || '';
      document.getElementById('clubB').textContent = state.clubB || state.teamBClub || '';
      document.getElementById('flagA').textContent = state.flagA || '🇮🇩';
      document.getElementById('flagB').textContent = state.flagB || '🇮🇩';

      const activeGame = state.activeGame || 1;
      const currentScore = state[`scoreGame${activeGame}`] || { a: 0, b: 0 };
      
      // Update Skor Utama Besar
      document.getElementById('scoreA').textContent = currentScore.a;
      document.getElementById('scoreB').textContent = currentScore.b;

      // Logika Toggle Service Border Highlight (Menyala Kuning/Hijau)
      document.getElementById('playerA').className = `team-row a ${state.serverSide === 'A' ? 'serving-A' : ''}`;
      document.getElementById('playerB').className = `team-row b ${state.serverSide === 'B' ? 'serving-B' : ''}`;

      // Logika memunculkan angka riwayat kecil Game 1 & Game 2 di sebelah kotak skor
      document.getElementById('histA1').textContent = activeGame > 1 ? (state.scoreGame1?.a ?? '') : '';
      document.getElementById('histB1').textContent = activeGame > 1 ? (state.scoreGame1?.b ?? '') : '';
      
      document.getElementById('histA2').textContent = activeGame > 2 ? (state.scoreGame2?.a ?? '') : '';
      document.getElementById('histB2').textContent = activeGame > 2 ? (state.scoreGame2?.b ?? '') : '';
    });

    // Menarik data awal (fetch) ketika display baru dinyalakan
    socket.on('connect', () => {
      socket.emit('state:request');
    });
  </script>
</body>
</html>
