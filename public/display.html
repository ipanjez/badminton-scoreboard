<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Score Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', 'Arial', 'Helvetica Neue', sans-serif;
      user-select: none;
    }

    /* ─── App layout ───────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ─── Team row ────────────────────────────── */
    .team-row {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 3vw;
      gap: 3vw;
      overflow: hidden;
      background: #000;
    }

    /* ─── Team info block (names + club) ────────── */
    .team-info {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ─── Player names ──────────────────────────── */
    .player-name-wrapper {
      display: block;
      width: 100%;
      padding: 0.8vh 1.5vw;
      margin-bottom: 0.8vh;
      color: var(--tc);
      border-radius: 0; /* Kotak siku */
      box-sizing: border-box;
    }
    .player-name-wrapper.serving {
      background: var(--tc);
      color: #000;
    }
    .player-name-text {
      font-size: clamp(32px, 5.2vw, 84px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      width: 100%;
    }

    /* ─── Club row (flag text + club name) ─────── */
    .club-row {
      display: flex;
      align-items: center;
      gap: 1vw;
      margin-top: 1vh;
      padding-left: 1.5vw;
    }
    .club-name {
      font-size: clamp(20px, 3.5vw, 60px);
      font-weight: 900;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(255,255,255,0.7);
    }
    .flag-text {
      font-size: clamp(14px, 2.5vw, 40px);
      font-weight: 900;
      padding: 2px 10px;
      border-radius: 4px;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* ─── Previous game scores ──────────────────── */
    .set-history {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5vh;
      flex-shrink: 0;
      min-width: 2.5vw;
    }
    .set-num {
      font-size: clamp(20px, 3vw, 45px);
      font-weight: 900;
      line-height: 1;
    }

    /* ─── Main score box ────────────────────────── */
    .main-score {
      width:  min(25vw, 45vh);
      height: min(25vw, 45vh);
      border-radius: min(1.2vw, 16px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(18vw, 32vh);
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      line-height: 1;
      padding-bottom: 2vh;
      font-variant-numeric: tabular-nums;
      transition: background 0.3s, box-shadow 0.3s, opacity 0.3s;
    }
    .main-score.serving {
      box-shadow: 0 0 50px rgba(var(--tc-rgb), 0.6),
                  0 0 120px rgba(var(--tc-rgb), 0.25);
    }
    .main-score:not(.serving) { opacity: 0.45; }

    /* ─── Center divider with game badge ───────── */
    #row-divider {
      flex-shrink: 0;
      height: 2vh;
      min-height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #game-badge {
      display: none; /* Hide the game text */
    }

    /* ─── Interval overlay ──────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.4s ease;
    }
    .overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .overlay-pulse { animation: oPulse 1.1s ease-in-out infinite; }
    @keyframes oPulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.04);} }
    .ov-title { font-size: clamp(56px,8vw,120px); font-weight:900; line-height:1; color:#FFD700; text-align:center; }
    .ov-score { font-size: clamp(32px,4vw,64px); color:#fff; margin-top:16px; text-align:center; }
    .ov-sub   { font-size: clamp(16px,2vw,32px); color:#999; margin-top:8px; text-align:center; }
  </style>
</head>
<body>
<div id="app">

  <!-- Team L (RED) -->
  <div class="team-row" id="row-L" style="--tc:#FF4400;--tc-rgb:255,68,0">
    <div class="team-info" id="info-L">
      <div class="player-name-wrapper" id="wrap-p1-L">
        <div class="player-name-text" id="t-p1-L">PLAYER A</div>
      </div>
      <div class="player-name-wrapper" id="wrap-p2-L" style="display:none">
        <div class="player-name-text" id="t-p2-L"></div>
      </div>
      <div class="club-row">
        <span class="flag-text" id="flag-L" style="display:none"></span>
        <span class="club-name" id="club-L"></span>
      </div>
    </div>
    <div class="set-history" id="hist-L"></div>
    <div class="main-score" id="score-L" style="background:#FF4400">0</div>
  </div>

  <!-- Center divider -->
  <div id="row-divider">
    <span id="game-badge">GAME 1</span>
  </div>

  <!-- Team R (GREEN) -->
  <div class="team-row" id="row-R" style="--tc:#00DD44;--tc-rgb:0,221,68">
    <div class="team-info" id="info-R">
      <div class="player-name-wrapper" id="wrap-p1-R">
        <div class="player-name-text" id="t-p1-R">PLAYER B</div>
      </div>
      <div class="player-name-wrapper" id="wrap-p2-R" style="display:none">
        <div class="player-name-text" id="t-p2-R"></div>
      </div>
      <div class="club-row">
        <span class="flag-text" id="flag-R" style="display:none"></span>
        <span class="club-name" id="club-R"></span>
      </div>
    </div>
    <div class="set-history" id="hist-R"></div>
    <div class="main-score" id="score-R" style="background:#005515">0</div>
  </div>

</div><!-- /app -->

<!-- Interval Overlay (score = 11) -->
<div class="overlay hidden" id="ov-interval">
  <div class="overlay-pulse" style="text-align:center">
    <div class="ov-title">INTERVAL</div>
    <div class="ov-score" id="ov-int-score">0 – 0</div>
    <div class="ov-sub">Istirahat 60 detik</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // Team color config
  const C = {
    L: { main: '#FF4400', rgb: '255,68,0' },
    R: { main: '#00DD44', rgb: '0,221,68' }
  };

  const socket = io();
  socket.on('state_update', render);

  function $id(id) { return document.getElementById(id); }

  function render(s) {
    $id('game-badge').textContent = `GAME ${s.activeGame}`;

    ['L', 'R'].forEach(side => {
      const t   = s.teams[side];
      const srv = s.serverSide === side;
      const c   = C[side];

      // We read a server flag from state if provided, otherwise default to p1 if side is serving
      let activeServer = s.serverP2 && s.serverP2[side] ? 2 : 1; 

      if (srv && !t.player2) {
        activeServer = 1; // force P1 if no P2
      }

      // Player names
      const maxFontSizeVar = s.displayNameFontSize || 84;
      
      for (let i = 1; i <= 2; i++) {
        const wrapEl = $id(`wrap-p${i}-${side}`);
        const txtEl = $id(`t-p${i}-${side}`);
        const name = (i === 1 ? t.player1 : t.player2) || (i === 1 ? `TEAM ${side}` : '');

        if (i === 2 && !t.player2) {
          wrapEl.style.display = 'none';
        } else {
          wrapEl.style.display = 'block';
          txtEl.textContent = name;
          txtEl.style.fontSize = `clamp(32px, 5.2vw, ${maxFontSizeVar}px)`;
          
          if (srv && activeServer === i) {
            wrapEl.classList.add('serving');
          } else {
            wrapEl.classList.remove('serving');
          }
        }
      }

      // Flag text (e.g. "ID") — hidden if empty
      const flagEl = $id(`flag-${side}`);
      flagEl.textContent   = t.flag || '';
      flagEl.style.display = t.flag ? 'inline-block' : 'none';

      // Club / PB — hidden if empty
      const clubEl = $id(`club-${side}`);
      clubEl.textContent   = t.club || '';
      clubEl.style.display = t.club ? 'inline-block' : 'none';

      // Score box
      const scEl = $id(`score-${side}`);
      scEl.textContent          = s.scores[`game${s.activeGame}`][side];
      scEl.style.background     = srv ? c.main : 'rgba(255,255,255,0.1)';
      scEl.style.color          = srv ? '#000' : '#fff';
      scEl.style.boxShadow      = srv
        ? `0 0 50px rgba(${c.rgb},0.8)`
        : 'none';
      scEl.style.opacity        = srv ? '1' : '0.6';
    });

    // Previous game scores
    ['L', 'R'].forEach(side => {
      const opp  = side === 'L' ? 'R' : 'L';
      const cont = $id(`hist-${side}`);
      cont.innerHTML = '';
      for (let g = 1; g < s.activeGame; g++) {
        const val    = s.scores[`game${g}`][side];
        const oppVal = s.scores[`game${g}`][opp];
        const span   = document.createElement('span');
        span.className   = 'set-num';
        span.textContent = val;
        span.style.color = val > oppVal ? C[side].main : '#444';
        cont.appendChild(span);
      }
    });

    // Interval overlay only
    if (s.isInterval && !s.isMatchOver) {
      const gk = `game${s.activeGame}`;
      $id('ov-int-score').textContent = `${s.scores[gk].L} – ${s.scores[gk].R}`;
      $id('ov-interval').classList.remove('hidden');
    } else {
      $id('ov-interval').classList.add('hidden');
    }
  }
</script>
</body>
</html>
