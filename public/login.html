<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon-login.svg" type="image/svg+xml">
  <title>Login — Badminton Scoreboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(ellipse at top, #0f172a 0%, #020617 100%); }
    .shuttle-glow { text-shadow: 0 0 20px #fbbf24, 0 0 40px #f59e0b; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-7xl shuttle-glow mb-3">🏸</div>
      <h1 class="text-3xl font-black text-white tracking-tight">Badminton</h1>
      <p class="text-yellow-400 font-semibold tracking-widest text-sm mt-1">SCOREBOARD SYSTEM</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800/80 backdrop-blur border border-slate-700 rounded-3xl shadow-2xl p-8">
      <h2 class="text-white font-bold text-lg mb-1">Panel Kontrol Wasit</h2>
      <p class="text-slate-400 text-sm mb-6">Masukkan PIN untuk mengakses controller.</p>

      <!-- Error -->
      <div id="err-msg" class="hidden bg-red-500/20 border border-red-500/50 text-red-300 rounded-xl px-4 py-3 mb-4 text-sm text-center">
        ❌ PIN salah. Silakan coba lagi.
      </div>

      <form id="loginForm" method="POST" action="/login" autocomplete="off">
        <input type="hidden" name="redirect" id="redirectInput" value="/controller">

        <label class="block text-slate-300 text-sm font-medium mb-2">PIN</label>
        <input
          type="password"
          name="pin"
          id="pinInput"
          placeholder="• • • • •"
          maxlength="20"
          autofocus
          required
          class="w-full bg-slate-900 text-white text-center text-3xl tracking-[0.5em] rounded-2xl px-4 py-4
                 border-2 border-slate-600 focus:border-yellow-400 focus:outline-none
                 placeholder:text-slate-600 placeholder:tracking-normal placeholder:text-lg
                 transition-colors"
        >

        <button
          type="submit"
          class="mt-5 w-full bg-yellow-400 hover:bg-yellow-300 active:bg-yellow-500
                 text-slate-900 font-black text-lg py-4 rounded-2xl transition-all
                 shadow-lg hover:shadow-yellow-400/30"
        >
          MASUK →
        </button>
      </form>
    </div>

    <!-- Back link -->
    <div class="text-center mt-6">
      <a href="/display" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">
        ← Kembali ke Tampilan Skor
      </a>
    </div>
  </div>

  <script>
    // Set redirect from URL
    const params = new URLSearchParams(location.search);
    const redir  = params.get('redirect');
    if (redir) document.getElementById('redirectInput').value = redir;

    // Show error
    if (params.get('err') === '1') {
      document.getElementById('err-msg').classList.remove('hidden');
      document.getElementById('pinInput').classList.add('border-red-500');
    }
  </script>
</body>
</html>
